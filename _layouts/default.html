<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="preload" href="/assets/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" fetchpriority="high">
    <script>document.documentElement.setAttribute('data-theme',window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');</script>
    {% seo %}
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="logo">
                <span>ToolsVault</span>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">Tools</a>
                <a href="/about/" class="nav-link{% if page.url == '/about/' %} active{% endif %}">About</a>
                <a href="/blog/" class="nav-link{% if page.url contains '/blog/' %} active{% endif %}">Blog</a>
                <a href="/#favorites" id="nav-favorites" class="nav-link nav-favorites" title="Your favorites" aria-label="Favorites">&#9829;<span class="fav-count" id="fav-count-header">0</span></a>
                <button type="button" id="theme-toggle" class="icon-btn" aria-label="Toggle light/dark theme" title="Toggle theme">&#9789;</button>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built for developers. <a href="{{ site.github }}">Star on GitHub</a></p>
        </div>
    </footer>

    <button type="button" id="back-to-top" class="back-to-top" aria-label="Back to top" title="Back to top">&#8593;</button>

    <script>
    // Universal UI (all pages): theme toggle, back-to-top, header favorites count
    document.addEventListener('DOMContentLoaded', function() {
        var btt = document.getElementById('back-to-top');
        if (btt) {
            window.addEventListener('scroll', function() {
                btt.classList.toggle('show', window.scrollY > 400);
            }, { passive: true });
            btt.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        }

        var themeToggle = document.getElementById('theme-toggle');
        function updateThemeIcon() {
            if (!themeToggle) return;
            themeToggle.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☀' : '☾';
        }
        if (themeToggle) {
            updateThemeIcon();
            themeToggle.addEventListener('click', function() {
                var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
                var next = cur === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                try { localStorage.setItem('toolsvault_theme', next); } catch(e){}
                updateThemeIcon();
            });
        }

        try {
            var fc = document.getElementById('fav-count-header');
            if (fc) fc.textContent = (JSON.parse(localStorage.getItem('toolsvault_favorites')) || []).length;
        } catch(e){}
    });(function(){try{var t=localStorage.getItem('toolsvault_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
    </script>

    {% if page.url == '/' %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('tool-search');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toolCards = Array.from(document.querySelectorAll('.category-section:not(#favorites-view) .tool-card'));
        const categorySections = document.querySelectorAll('.category-section:not(#favorites-view)');
        const noResults = document.getElementById('no-results');
        const favCountEl = document.getElementById('fav-count');
        const favCountHeader = document.getElementById('fav-count-header');
        const favoritesView = document.getElementById('favorites-view');
        const favoritesGrid = document.getElementById('favorites-grid');
        const favTotalEl = document.getElementById('fav-total');
        let activeCategory = 'all';

        const FAV_KEY = 'toolsvault_favorites';
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
            catch (e) { return []; }
        }
        function isFavorite(id) {
            return getFavorites().includes(id);
        }
        function setFavorite(id, fav) {
            let favs = getFavorites();
            if (fav && !favs.includes(id)) favs.push(id);
            if (!fav) favs = favs.filter(x => x !== id);
            try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {}
            updateFavButtons();
            updateFavCount();
            if (activeCategory === 'favorites') renderFavorites();
        }
        function updateFavButtons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const fav = isFavorite(btn.dataset.fav);
                btn.classList.toggle('active', fav);
                btn.textContent = fav ? '\u2665' : '\u2661';
                btn.setAttribute('aria-label', fav ? 'Remove favorite' : 'Add favorite');
            });
        }
        function updateFavCount() {
            const n = getFavorites().length;
            if (favCountEl) favCountEl.textContent = n;
            if (favTotalEl) favTotalEl.textContent = n;
            if (favCountHeader) favCountHeader.textContent = n;
        }
        function renderFavorites() {
            favoritesGrid.innerHTML = '';
            const favs = getFavorites();
            const cards = toolCards.filter(c => favs.includes(c.dataset.fav));
            if (cards.length === 0) {
                favoritesGrid.innerHTML = '<p class="fav-empty">No favorites yet. Tap the heart on a tool to save it.</p>';
            } else {
                cards.forEach(c => favoritesGrid.appendChild(c.cloneNode(true)));
            }
            favoritesView.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.fav-btn');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            setFavorite(btn.dataset.fav, !isFavorite(btn.dataset.fav));
        });

        const clearBtn = document.getElementById('clear-favorites');
        if (clearBtn) {
            clearBtn.addEventListener('click', function() {
                try { localStorage.removeItem(FAV_KEY); } catch (e) {}
                updateFavButtons();
                updateFavCount();
                if (activeCategory === 'favorites') renderFavorites();
            });
        }

        function filterTools() {
            const query = searchInput.value.toLowerCase().trim();
            let visible = 0;
            toolCards.forEach(card => {
                const title = (card.dataset.title || '').toLowerCase();
                const description = (card.dataset.description || '').toLowerCase();
                const tags = (card.dataset.tags || '').toLowerCase();
                const cardCategory = (card.dataset.category || '').toLowerCase();
                const matchesSearch = title.includes(query) || description.includes(query) || tags.includes(query);
                const matchesCategory = activeCategory === 'all' || cardCategory.includes(activeCategory);
                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            categorySections.forEach(section => {
                const sectionCategory = (section.dataset.category || '').toLowerCase();
                const hasVisible = !!section.querySelector('.tool-card:not([style*="display: none"])');
                const matchesCategory = activeCategory === 'all' || sectionCategory.includes(activeCategory);
                section.style.display = (matchesCategory && hasVisible) ? 'block' : 'none';
            });
            favoritesView.style.display = 'none';
            noResults.style.display = (visible === 0) ? 'block' : 'none';
        }

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.category;
                if (activeCategory === 'favorites') {
                    categorySections.forEach(s => s.style.display = 'none');
                    noResults.style.display = 'none';
                    renderFavorites();
                    if (location.hash !== '#favorites') location.hash = '#favorites';
                } else {
                    filterTools();
                    if (location.hash) location.hash = '';
                }
            });
        });

        searchInput.addEventListener('input', function() {
            if (activeCategory === 'favorites') return;
            filterTools();
        });

        const randomBtn = document.getElementById('random-tool');
        if (randomBtn) {
            randomBtn.addEventListener('click', function() {
                const hrefs = toolCards.map(c => c.getAttribute('href')).filter(Boolean);
                if (hrefs.length) window.location.href = hrefs[Math.floor(Math.random() * hrefs.length)];
            });
        }

        document.addEventListener('keydown', function(e) {
            const tag = (e.target.tagName || '').toLowerCase();
            const typing = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
            if (e.key === '/' && !typing) {
                e.preventDefault();
                searchInput.focus();
            } else if (e.key === 'Escape' && document.activeElement === searchInput) {
                searchInput.value = '';
                filterTools();
                searchInput.blur();
            }
        });

        function handleFavoritesHash() {
            if (location.hash === '#favorites') {
                const fb = document.querySelector('.filter-btn[data-category="favorites"]');
                if (fb && activeCategory !== 'favorites') fb.click();
                window.scrollTo({ top: 0 });
            }
        }

        if (location.hash === '#favorites') {
            handleFavoritesHash();
        }

        window.addEventListener('hashchange', handleFavoritesHash);

        updateFavButtons();
        updateFavCount();
    });
    </script>
    {% endif %}
    {% if site.analytics_id and site.analytics_id != "" %}
    <script data-goatcounter="https://{{ site.analytics_id }}.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    {% endif %}
</body>
</html>
