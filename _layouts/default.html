<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}
</head>
<body>
    <header class="site-header">
        <div class="container">
                <a href="/" class="logo">
                    <span>ToolsVault</span>
                </a>
            <nav class="main-nav">
                <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">Tools</a>
                <a href="/about/" class="nav-link{% if page.url == '/about/' %} active{% endif %}">About</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built for developers. <a href="https://github.com/yourusername/toolsvault">Star on GitHub</a></p>
        </div>
    </footer>

    {% if page.url == '/' %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('tool-search');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toolCards = document.querySelectorAll('.tool-card');
        const categorySections = document.querySelectorAll('.category-section');
        const noResults = document.getElementById('no-results');
        const favCountEl = document.getElementById('fav-count');
        let activeCategory = 'all';

        const FAV_KEY = 'toolsvault_favorites';
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
            catch (e) { return []; }
        }
        function isFavorite(id) {
            return getFavorites().includes(id);
        }
        function setFavorite(id, fav) {
            let favs = getFavorites();
            if (fav && !favs.includes(id)) favs.push(id);
            if (!fav) favs = favs.filter(x => x !== id);
            try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {}
            updateFavButtons();
            updateFavCount();
        }
        function updateFavButtons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const fav = isFavorite(btn.dataset.fav);
                btn.classList.toggle('active', fav);
                btn.innerHTML = fav ? '&#9829;' : '&#9825;';
                btn.setAttribute('aria-label', fav ? 'Remove favorite' : 'Add favorite');
            });
        }
        function updateFavCount() {
            if (favCountEl) favCountEl.textContent = getFavorites().length;
        }

        document.querySelectorAll('.fav-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const id = btn.dataset.fav;
                setFavorite(id, !isFavorite(id));
                if (activeCategory === 'favorites') filterTools();
            });
        });

        function filterTools() {
            const query = searchInput.value.toLowerCase().trim();
            let visible = 0;
            const showFavoritesOnly = activeCategory === 'favorites';
            toolCards.forEach(card => {
                const title = (card.dataset.title || '').toLowerCase();
                const description = (card.dataset.description || '').toLowerCase();
                const tags = (card.dataset.tags || '').toLowerCase();
                const cardCategory = (card.dataset.category || '').toLowerCase();
                const matchesSearch = title.includes(query) || description.includes(query) || tags.includes(query);
                const matchesCategory = activeCategory === 'all' || cardCategory.includes(activeCategory);
                const matchesFavorites = !showFavoritesOnly || isFavorite(card.dataset.fav);
                if (matchesSearch && matchesCategory && matchesFavorites) {
                    card.style.display = 'flex';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            categorySections.forEach(section => {
                const sectionCategory = (section.dataset.category || '').toLowerCase();
                const hasVisible = !!section.querySelector('.tool-card:not([style*="display: none"])');
                const matchesCategory = activeCategory === 'all' || sectionCategory.includes(activeCategory);
                const matchesFavorites = !showFavoritesOnly || hasVisible;
                section.style.display = (matchesCategory && hasVisible && matchesFavorites) ? 'block' : 'none';
            });
            if (showFavoritesOnly && visible === 0) {
                noResults.querySelector('p').textContent = 'No favorites yet. Tap the heart on a tool to save it.';
            } else {
                noResults.querySelector('p').textContent = 'No tools match your search.';
            }
            noResults.style.display = visible === 0 ? 'block' : 'none';
        }

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.category;
                filterTools();
            });
        });

        searchInput.addEventListener('input', filterTools);

        updateFavButtons();
        updateFavCount();
    });
    </script>
    {% endif %}
</body>
</html>
