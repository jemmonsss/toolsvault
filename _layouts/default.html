<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}
</head>
<body>
    <header class="site-header">
        <div class="container">
                <a href="/" class="logo">
                    <span>ToolsVault</span>
                </a>
            <nav class="main-nav">
                <a href="/" class="nav-link{% if page.url == '/' %} active{% endif %}">Tools</a>
                <a href="/about/" class="nav-link{% if page.url == '/about/' %} active{% endif %}">About</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built for developers. <a href="https://github.com/yourusername/toolsvault">Star on GitHub</a></p>
        </div>
    </footer>

    {% if page.url == '/' %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('tool-search');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toolCards = Array.from(document.querySelectorAll('.category-section:not(#favorites-view) .tool-card'));
        const categorySections = document.querySelectorAll('.category-section:not(#favorites-view)');
        const noResults = document.getElementById('no-results');
        const favCountEl = document.getElementById('fav-count');
        const favoritesView = document.getElementById('favorites-view');
        const favoritesGrid = document.getElementById('favorites-grid');
        const favTotalEl = document.getElementById('fav-total');
        let activeCategory = 'all';

        const FAV_KEY = 'toolsvault_favorites';
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }
            catch (e) { return []; }
        }
        function isFavorite(id) {
            return getFavorites().includes(id);
        }
        function setFavorite(id, fav) {
            let favs = getFavorites();
            if (fav && !favs.includes(id)) favs.push(id);
            if (!fav) favs = favs.filter(x => x !== id);
            try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); } catch (e) {}
            updateFavButtons();
            updateFavCount();
            if (activeCategory === 'favorites') renderFavorites();
        }
        function updateFavButtons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const fav = isFavorite(btn.dataset.fav);
                btn.classList.toggle('active', fav);
                btn.textContent = fav ? '\u2665' : '\u2661';
                btn.setAttribute('aria-label', fav ? 'Remove favorite' : 'Add favorite');
            });
        }
        function updateFavCount() {
            const n = getFavorites().length;
            if (favCountEl) favCountEl.textContent = n;
            if (favTotalEl) favTotalEl.textContent = n;
        }
        function renderFavorites() {
            favoritesGrid.innerHTML = '';
            const favs = getFavorites();
            const cards = toolCards.filter(c => favs.includes(c.dataset.fav));
            if (cards.length === 0) {
                favoritesGrid.innerHTML = '<p class="fav-empty">No favorites yet. Tap the heart on a tool to save it.</p>';
            } else {
                cards.forEach(c => favoritesGrid.appendChild(c.cloneNode(true)));
            }
            favoritesView.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.fav-btn');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            setFavorite(btn.dataset.fav, !isFavorite(btn.dataset.fav));
        });

        function filterTools() {
            const query = searchInput.value.toLowerCase().trim();
            let visible = 0;
            toolCards.forEach(card => {
                const title = (card.dataset.title || '').toLowerCase();
                const description = (card.dataset.description || '').toLowerCase();
                const tags = (card.dataset.tags || '').toLowerCase();
                const cardCategory = (card.dataset.category || '').toLowerCase();
                const matchesSearch = title.includes(query) || description.includes(query) || tags.includes(query);
                const matchesCategory = activeCategory === 'all' || cardCategory.includes(activeCategory);
                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visible++;
                } else {
                    card.style.display = 'none';
                }
            });
            categorySections.forEach(section => {
                const sectionCategory = (section.dataset.category || '').toLowerCase();
                const hasVisible = !!section.querySelector('.tool-card:not([style*="display: none"])');
                const matchesCategory = activeCategory === 'all' || sectionCategory.includes(activeCategory);
                section.style.display = (matchesCategory && hasVisible) ? 'block' : 'none';
            });
            favoritesView.style.display = 'none';
            noResults.style.display = (visible === 0) ? 'block' : 'none';
        }

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.category;
                if (activeCategory === 'favorites') {
                    categorySections.forEach(s => s.style.display = 'none');
                    noResults.style.display = 'none';
                    renderFavorites();
                } else {
                    filterTools();
                }
            });
        });

        searchInput.addEventListener('input', function() {
            if (activeCategory === 'favorites') return;
            filterTools();
        });

        updateFavButtons();
        updateFavCount();
    });
    </script>
    {% endif %}
</body>
</html>
