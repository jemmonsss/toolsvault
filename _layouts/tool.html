---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% seo %}
</head>
<body>
    <header class="site-header">
        <div class="container">
                <a href="/" class="logo">
                    <span>ToolsVault</span>
                </a>
            <nav class="main-nav">
                <a href="/" class="nav-link">Tools</a>
                <a href="/about/" class="nav-link">About</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="tool-page">
            <div class="container">
                <div class="tool-header">
                    <h1>{{ page.title }}</h1>
                    <div class="tool-meta">
                        {% if page.icon %}<span class="tool-icon">{{ page.icon }}</span>{% endif %}
                        <span class="tool-category">{{ page.category | default: 'Tool' }}</span>
                    </div>
                </div>
                <div class="tool-content">
                    <div class="tool-main">
                        <div class="tool-description">
                            {{ content }}
                        </div>
                        <div class="tool-actions">
                            <a href="{{ page.link }}" target="_blank" rel="noopener" class="btn btn-primary">Visit Tool</a>
                        </div>
                    </div>
                    <aside class="tool-sidebar">
                        <div class="tool-tags">
                            <h3>Tags</h3>
                            <div class="tag-list">
                                {% for tag in page.tags %}
                                <span class="tag">{{ tag }}</span>
                                {% endfor %}
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built for developers. <a href="https://github.com/yourusername/toolsvault">Star on GitHub</a></p>
        </div>
    </footer>
</body>
</html>
