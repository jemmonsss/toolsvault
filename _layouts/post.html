---
layout: default
---
<article class="blog-page">
    <div class="container">
        <a href="/blog/" class="text-btn">&#8592; All posts</a>
        <h1>{{ page.title }}</h1>
        <p class="blog-meta">
            {{ page.date | date: "%B %-d, %Y" }}
            {% if page.author %}<span> &middot; {{ page.author }}</span>{% endif %}
        </p>
        <div class="content">
            {{ content }}
        </div>
    </div>
</article>
