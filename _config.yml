title: "ToolsVault"
description: "A curated vault of developer tools and resources"
baseurl: ""
url: "https://toolsvault.org"

social:
  name: "ToolsVault"
  links:
    - "https://github.com/yourusername/toolsvault"

theme: null

plugins:
  - jekyll-seo-tag

markdown: kramdown

collections:
  tools:
    output: true
    permalink: /tools/:name/

defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - _sass
