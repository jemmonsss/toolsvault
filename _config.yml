title: "ToolsVault"
description: "A curated vault of developer tools and resources"
baseurl: ""
url: "https://toolsvault.org"

# Privacy-friendly analytics (GoatCounter). Leave empty to disable.
# Set to your GoatCounter site code, e.g. "toolsvault".
analytics_id: ""

social:
  name: "ToolsVault"
  links:
    - "https://github.com/yourusername/toolsvault"

theme: null

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown

collections:
  tools:
    output: true
    permalink: /tools/:name/
  blog:
    output: true
    permalink: /blog/:name/

defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
  - scope:
      type: "blog"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - _sass
